<!DOCTYPE html>
<html>
<head>
<title>Game Klik Cepat</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
margin-top:60px;
}

button{
padding:15px 30px;
font-size:20px;
background:blue;
color:white;
border:none;
border-radius:10px;
}

#score{
font-size:30px;
margin:20px;
}

</style>

</head>

<body>

<h1>Game Klik Cepat 🎮</h1>

<p>Klik tombol sebanyak mungkin dalam 10 detik!</p>

<h2 id="score">Skor: 0</h2>

<button onclick="klik()">KLIK!</button>

<p id="timer">Waktu: 10</p>

<script>

let skor = 0;
let waktu = 10;
let mulai = false;

function klik(){

if(!mulai){
mulai = true;
timer();
}

skor++;
document.getElementById("score").innerHTML = "Skor: " + skor;

}

function timer(){

let hitung = setInterval(function(){

waktu--;
document.getElementById("timer").innerHTML = "Waktu: " + waktu;

if(waktu == 0){
clearInterval(hitung);
alert("Game selesai! Skor kamu: " + skor);
}

},1000);

}

</script>

</body>
</html>
