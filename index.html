<!DOCTYPE html>
<html>
<head>
<title>Jasa Cukur Keren</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
transition:0.3s;
}

/* DARK MODE */
.dark{
background:#111;
color:white;
}
.dark .card{
background:#222;
color:white;
}

.dark .testi{
background:#222;
color:white;
}
/* NAVBAR */
.navbar{
background:linear-gradient(90deg,#111,#444);
color:white;
padding:15px;
text-align:center;
font-size:22px;
}
.dark .navbar{
background:black;
}

.dark button{
background:white;
color:black;
}
/* HERO */
.hero{
padding:60px 20px;
text-align:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
}

/* BUTTON */
button{
padding:12px 25px;
background:#111;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

/* SECTION */
.section{
padding:40px 20px;
text-align:center;
}

/* CARD */
.card{
background:white;
margin:10px;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TESTI */
.testi{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

/* ANIMASI MASUK */
.fade{
opacity:0;
transform:translateY(30px);
transition:1s;
}

.show{
opacity:1;
transform:translateY(0);
}

/* WHATSAPP FLOAT */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:20px;
text-decoration:none;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="navbar">
Jasa Cukur Keren 💈
</div>

<div class="hero fade">
<h1>Cukur Rapi & Stylish</h1>
<p>Harga terjangkau, hasil maksimal 🔥</p>

<button onclick="wa()">Booking Sekarang</button>
<br><br>
<button onclick="darkMode()">🌙 Dark Mode</button>
</div>

<div class="section fade">

<h2>Layanan Kami</h2>

<div class="card">✂️ Cukur Dewasa</div>
<div class="card">👦 Cukur Anak</div>
<div class="card">💇 Styling Rambut</div>

</div>

<div class="section fade">

<h2>Kenapa Pilih Kami?</h2>

<div class="card">✔ Harga Terjangkau</div>
<div class="card">✔ Pelayanan Ramah</div>
<div class="card">✔ Hasil Rapi</div>

</div>

<div class="section fade">

<h2>Testimoni</h2>

<div class="testi">"Hasilnya rapi banget!" ⭐⭐⭐⭐⭐</div>
<div class="testi">"Pelayanan ramah!" ⭐⭐⭐⭐⭐</div>

</div>

<!-- WA FLOAT -->
<a href="https://wa.me/6281234567890" class="wa-float">💬</a>

<script>

/* WHATSAPP */
function wa(){
window.open("https://wa.me/6281234567890");
}

/* DARK MODE */
function darkMode(){
document.body.classList.toggle("dark");
}

/* ANIMASI SCROLL */
let elements = document.querySelectorAll(".fade");

window.addEventListener("scroll", function(){
elements.forEach(el => {
let posisi = el.getBoundingClientRect().top;
let tinggi = window.innerHeight;

if(posisi < tinggi - 50){
el.classList.add("show");
}
});
});

</script>

</body>
</html>
